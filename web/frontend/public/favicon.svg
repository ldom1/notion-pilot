<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#6e56cf"/>
  <!-- Compass rose / pilot wheel: 4 cardinal points -->
  <circle cx="16" cy="16" r="5" fill="white" opacity="0.95"/>
  <!-- North pointer (filled, dark) -->
  <polygon points="16,3 14,13 18,13" fill="white"/>
  <!-- South pointer (outlined) -->
  <polygon points="16,29 14,19 18,19" fill="white" opacity="0.5"/>
  <!-- East pointer -->
  <polygon points="29,16 19,14 19,18" fill="white" opacity="0.5"/>
  <!-- West pointer -->
  <polygon points="3,16 13,14 13,18" fill="white" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#6e56cf"/>
</svg>
