name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy notion_pilot

      - name: Lint (pylint, fail under 9.5)
        run: uv run pylint notion_pilot --fail-under=9.5

      - name: Tests unit
        run: uv run pytest tests/unit -v

      - name: Tests integration (for develop & main branches only)
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        run: uv run pytest tests/integration -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        working-directory: web/frontend
        run: npm ci

      # Same command as docker/Dockerfile.web — `tsc -b` walks into the
      # tsconfig project references, which `tsc --noEmit` on the solution
      # config silently skips.
      - name: Build (tsc -b && vite build)
        working-directory: web/frontend
        run: npm run build