scripts:
  # ── CRM ────────────────────────────────────────────────────────────────────

  - id: refresh_people
    label: Refresh People
    description: Dedup + enrich contacts in one pass — flags duplicates then fills missing data
    path: scripts/crm/crm_refresh_people.py
    args: []
    category: CRM
    params:
      - id: dry_run
        label: Dry run (preview only, no writes)
        type: boolean
        flag: --dry-run
        default: false
        help: "Preview duplicates and enrichment results without modifying Notion"

  - id: refresh_companies
    label: Refresh Companies
    description: Dedup + enrich companies in one pass — flags duplicates then fills missing data
    path: scripts/crm/crm_refresh_companies.py
    args: []
    category: CRM
    params:
      - id: dry_run
        label: Dry run (preview only, no writes)
        type: boolean
        flag: --dry-run
        default: false
        help: "Preview duplicates and enrichment results without modifying Notion"

  - id: import_linkedin
    label: Import LinkedIn
    description: Import LinkedIn Connections.csv — place file at data/crm/linkedin/Connections.csv first
    path: scripts/crm/crm_import_linkedin.py
    args: []
    category: CRM
    params:
      - id: dry_run
        label: Dry run (preview only, no writes)
        type: boolean
        flag: --dry-run
        default: true
        help: "Recommended: preview the import first. Uncheck to write directly to Notion.\nFile expected at: data/crm/linkedin/Connections.csv"

  # ── Inbox ──────────────────────────────────────────────────────────────────

  - id: get_people_from_email
    label: Get People from Emails
    description: Preview contacts extracted from email senders (dry run — no writes)
    path: scripts/inbox/process_email.py
    args: ["--dry-run"]
    category: Inbox
    params:
      - id: since_days
        label: Last N days
        type: number
        flag: --since-days
        default: 30
        min: 1
        max: 365
        help: "Scan emails received in the last N days"

  - id: retrieve_email
    label: Retrieve Emails
    description: Fetch new emails from IMAP and sync to Notion knowledge base
    path: scripts/inbox/process_email.py
    args: []
    category: Inbox
    params:
      - id: since_days
        label: Last N days
        type: number
        flag: --since-days
        default: 7
        min: 1
        max: 365
        help: "Only fetch emails received in the last N days"
      - id: limit
        label: Max emails
        type: number
        flag: --limit
        default: 0
        min: 0
        max: 500
        help: "Cap the number of emails processed (0 = no limit)"

  - id: enrich_knowledge
    label: Enrich Knowledge
    description: Triage Telegram messages → structured meta-pages in 4 knowledge databases (Notions, Idées, Tools, Data & Tech)
    path: scripts/inbox/enrich_knowledge.py
    args: []
    category: Inbox
    params:
      - id: dry_run
        label: Dry run (preview only, no writes)
        type: boolean
        flag: --dry-run
        default: true
        help: "Preview what would be created/enriched without modifying Notion"
      - id: limit
        label: Max pages
        type: number
        flag: --limit
        default: 5
        min: 1
        max: 200
        help: "Cap the number of source pages to process (0 = no limit)"
      - id: dedup
        label: Dedup mode (scan all IA pages for duplicates)
        type: boolean
        flag: --dedup
        default: false
        help: "Scan all IA-authored pages in the 4 target DBs and auto-merge confirmed duplicates"
      - id: purge
        label: Purge old Analysed pages (> 14 days)
        type: boolean
        flag: --purge
        default: false
        help: "Archive source pages with Status=Analysed that are older than 14 days"
