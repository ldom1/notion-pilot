scripts:
  # ── CRM ────────────────────────────────────────────────────────────────────

  - id: refresh_people
    label: Refresh People
    description: Scan People for likely duplicates (read-only report; enrichment is now via the MCP enrich_people tool)
    path: scripts/crm/crm_refresh_people.py
    args: []
    category: CRM

  - id: refresh_companies
    label: Refresh Companies
    description: Scan Companies for likely duplicates (read-only report; enrichment is now via the MCP enrich_companies tool)
    path: scripts/crm/crm_refresh_companies.py
    args: []
    category: CRM

  - id: import_linkedin
    label: Import LinkedIn
    description: Import LinkedIn Connections.csv — place file at data/crm/linkedin/Connections.csv first
    path: scripts/crm/crm_import_linkedin.py
    args: []
    category: CRM
    params:
      - id: dry_run
        label: Dry run (preview only, no writes)
        type: boolean
        flag: --dry-run
        default: true
        help: "Recommended: preview the import first. Uncheck to write directly to Notion.\nFile expected at: data/crm/linkedin/Connections.csv"

  # ── Inbox ──────────────────────────────────────────────────────────────────

  - id: get_people_from_email
    label: Get People from Emails
    description: Preview contacts extracted from email senders (dry run — no writes)
    path: scripts/inbox/process_email.py
    args: ["--dry-run"]
    category: Inbox
    params:
      - id: since_days
        label: Last N days
        type: number
        flag: --since-days
        default: 30
        min: 1
        max: 365
        help: "Scan emails received in the last N days"

  - id: retrieve_email
    label: Retrieve Emails
    description: Fetch new emails from IMAP and sync to Notion knowledge base
    path: scripts/inbox/process_email.py
    args: []
    category: Inbox
    params:
      - id: since_days
        label: Last N days
        type: number
        flag: --since-days
        default: 7
        min: 1
        max: 365
        help: "Only fetch emails received in the last N days"
      - id: limit
        label: Max emails
        type: number
        flag: --limit
        default: 0
        min: 0
        max: 500
        help: "Cap the number of emails processed (0 = no limit)"
