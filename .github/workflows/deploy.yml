name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to devbox
        uses: appleboy/ssh-action@v1
        with:
          host: 100.64.162.103
          port: 16152
          username: lgiron
          key: ${{ secrets.DEVBOX_SSH_KEY }}
          script: |
            cd /home/lgiron/Lab/notion-pilot
            GIT_SSH_COMMAND="ssh -i /home/lgiron/.ssh/notion-pilot-deploy -o StrictHostKeyChecking=no" git pull
            docker compose up --build -d
